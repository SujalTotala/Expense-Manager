<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Expense Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <header>
        <h1>Expense Manager</h1>
    </header>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="card">
            <h2>Add Participant</h2>
            <input type="text" id="name" placeholder="Enter name">
            <button onclick="addParticipant()">Add</button>

            <h3>Participants</h3>
            <ul id="participantList"></ul>
        </div>

        <!-- RIGHT PANEL -->
        <div class="card">

            <h2>Add Expense</h2>
            <input id="title" placeholder="Title">
            <input id="amount" type="number" placeholder="Amount">
            <input id="category" placeholder="Category">

            <label>Paid By:</label>
            <select id="paidBy"></select>

            <label>Select Participants:</label>
            <select id="participants" multiple></select>

            <button class="primary" onclick="addExpense()">Add Expense</button>

            <h3>Expenses</h3>
            <button onclick="loadExpenses()">Load</button>
            <ul id="expenseList"></ul>

            <h3>Balances</h3>
            <button onclick="getBalances()">Show</button>
            <ul id="balances"></ul>

            <button class="danger" onclick="settleUp()">Settle Up</button>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
